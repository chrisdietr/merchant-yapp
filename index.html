<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Yapp Shop</title>
    <meta name="description" content="A modern merchant shop with direct purchase functionality" />
    <meta name="author" content="Lovable" />

    <!-- Social media meta tags - these will be dynamically updated by JavaScript -->
    <meta property="og:title" content="Merchant Yapp Shop" id="og-title" />
    <meta property="og:description" content="A modern merchant shop with direct purchase functionality" id="og-description" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" id="og-url" />
    <meta property="og:image" id="og-image" content="" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:title" content="Merchant Yapp Shop" id="twitter-title" />
    <meta name="twitter:description" content="A modern merchant shop with direct purchase functionality" id="twitter-description" />
    <meta name="twitter:image" id="twitter-image" content="" />
    
    <!-- Meta tag update script -->
    <script>
      // This script dynamically updates meta tags for social media preview
      function updateMetaTags() {
        // Check if we're on a confirmation page
        if (window.location.pathname.includes('/confirmation/')) {
          console.log('Detected confirmation page - updating meta tags');
          
          // Extract order ID and amount
          const pathParts = window.location.pathname.split('/');
          const orderId = pathParts[pathParts.length - 1];
          const urlParams = new URLSearchParams(window.location.search);
          const amount = urlParams.get('amount');
          
          console.log('Order ID:', orderId);
          console.log('Amount:', amount);
          
          // Generate dynamic title and description
          let productName = "Product";
          if (orderId && orderId.startsWith('product_')) {
            const productId = orderId.split('_')[1];
            
            // Map product IDs to names (this should match your shops.json)
            const productMap = {
              "1": "Shirt",
              "2": "Hat",
              "3": "Hoodie"
            };
            
            if (productMap[productId]) {
              productName = productMap[productId];
            }
          }
          
          // Update meta tags
          const title = `${productName} Order - Payment Complete`;
          const description = `Order confirmation for ${productName}${amount ? ' - ' + amount : ''}. Thank you for your purchase!`;
          
          // Generate absolute URLs
          const baseUrl = window.location.origin;
          const currentPageUrl = window.location.href;
          const socialPreviewUrl = `${baseUrl}/social-preview/${orderId}`;
          
          console.log('Title:', title);
          console.log('Description:', description);
          console.log('Social preview URL:', socialPreviewUrl);
          
          // Update all meta tags
          document.title = title;
          document.querySelector('meta[name="description"]').setAttribute('content', description);
          
          // Open Graph
          document.getElementById('og-title').setAttribute('content', title);
          document.getElementById('og-description').setAttribute('content', description);
          document.getElementById('og-url').setAttribute('content', currentPageUrl);
          document.getElementById('og-image').setAttribute('content', socialPreviewUrl);
          
          // Twitter
          document.getElementById('twitter-title').setAttribute('content', title);
          document.getElementById('twitter-description').setAttribute('content', description);
          document.getElementById('twitter-image').setAttribute('content', socialPreviewUrl);
          
          console.log('Meta tags updated successfully');
        }
      }
      
      // Run immediately and also when the DOM is fully loaded
      updateMetaTags();
      document.addEventListener('DOMContentLoaded', updateMetaTags);
      
      // Also run when URL changes (for SPA behavior)
      window.addEventListener('popstate', updateMetaTags);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Yapp Shop</title>
    <meta name="description" content="A modern merchant shop with direct purchase functionality" />
    <meta name="author" content="Lovable" />

    <!-- Social media meta tags - these will be dynamically updated by JavaScript -->
    <meta property="og:title" content="Merchant Yapp Shop" id="og-title" />
    <meta property="og:description" content="A modern merchant shop with direct purchase functionality" id="og-description" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" id="og-url" />
    <meta property="og:image" content="" id="og-image" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:title" content="Merchant Yapp Shop" id="twitter-title" />
    <meta name="twitter:description" content="A modern merchant shop with direct purchase functionality" id="twitter-description" />
    <meta name="twitter:image" content="" id="twitter-image" />
    
    <!-- Meta tag update script -->
    <script>
      // This script dynamically updates meta tags for social media preview
      function updateMetaTags() {
        const currentPath = window.location.pathname;
        let orderId = null;
        
        // Check if we're on a confirmation or verify page
        if (currentPath.includes('/confirmation/') || currentPath.includes('/verify/')) {
          console.log(`Detected ${currentPath.includes('/confirmation/') ? 'confirmation' : 'verify'} page - updating meta tags`);
          
          // Extract order ID based on path structure
          const pathParts = currentPath.split('/');
          if (currentPath.includes('/confirmation/')) {
            orderId = pathParts[pathParts.length - 1]; // /confirmation/:orderId
          } else if (currentPath.includes('/verify/')) {
            orderId = pathParts[pathParts.length - 2]; // /verify/:orderId/:txHash?
          }
          
          if (!orderId) {
            console.error('Could not extract orderId from path:', currentPath);
            return;
          }
          
          const urlParams = new URLSearchParams(window.location.search);
          const amount = urlParams.get('amount'); // Amount might only be on confirmation URL
          
          console.log('Order ID:', orderId);
          console.log('Amount (from URL):', amount);
          
          // Generate dynamic title and description
          let productName = "Product";
          let shopName = "Merchant Yapp Shop";
          
          if (orderId && orderId.startsWith('product_')) {
            const productId = orderId.split('_')[1];
            
            // Map product IDs to names (this should match your shops.json)
            const productMap = {
              "1": "Shirt",
              "2": "Hat",
              "3": "Hoodie"
            };
            
            // Map product IDs to shop names
            const shopMap = {
              "1": "Merchant Yapp Demo Shop",
              "2": "Merchant Yapp Demo Shop",
              "3": "Merchant Yapp Demo Shop"
            };
            
            if (productMap[productId]) {
              productName = productMap[productId];
            }
            
            if (shopMap[productId]) {
              shopName = shopMap[productId];
            }
          }
          
          // Update meta tags with the correct format
          const title = `Purchase confirmed ✅`;
          const description = `Just bought ${productName} from ${shopName}`;
          
          // Generate absolute URLs
          const baseUrl = window.location.origin;
          const currentPageUrl = window.location.href;
          // Always point the image to the social-preview route with the orderId
          const socialPreviewUrl = `${baseUrl}/social-preview/${orderId}`;
          
          console.log('Title:', title);
          console.log('Description:', description);
          console.log('Social preview URL:', socialPreviewUrl);
          
          // Update all meta tags
          document.title = title;
          document.querySelector('meta[name="description"]').setAttribute('content', description);
          
          // Update specific meta tags by ID
          const ogTitle = document.getElementById('og-title');
          const ogDescription = document.getElementById('og-description');
          const ogUrl = document.getElementById('og-url');
          const ogImage = document.getElementById('og-image');
          const twitterTitle = document.getElementById('twitter-title');
          const twitterDescription = document.getElementById('twitter-description');
          const twitterImage = document.getElementById('twitter-image');
          
          if (ogTitle) ogTitle.setAttribute('content', title);
          if (ogDescription) ogDescription.setAttribute('content', description);
          if (ogUrl) ogUrl.setAttribute('content', currentPageUrl);
          if (ogImage) ogImage.setAttribute('content', socialPreviewUrl);
          if (twitterTitle) twitterTitle.setAttribute('content', title);
          if (twitterDescription) twitterDescription.setAttribute('content', description);
          if (twitterImage) twitterImage.setAttribute('content', socialPreviewUrl);
          
          console.log('Meta tags updated successfully');
        }
      }
      
      // Run immediately and also when the DOM is fully loaded
      updateMetaTags();
      document.addEventListener('DOMContentLoaded', updateMetaTags);
      
      // Also run when URL changes (for SPA behavior)
      window.addEventListener('popstate', updateMetaTags);
      // Re-run after navigation event for SPA routers that don't trigger popstate reliably
      window.addEventListener('locationchange', updateMetaTags);
      
      // Additional fallback - run after a short delay 
      setTimeout(updateMetaTags, 500);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
